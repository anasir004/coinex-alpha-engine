services:
  - type: web
    name: coinex-alpha-engine
    env: node
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
    autoDeploy: true
